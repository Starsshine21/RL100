name: realrobot_pick_place_dexcollector

task_name: pick_place
image_height: 84
image_width: 84
dataset_zarr_path: ${oc.env:REALROBOT_ZARR_PATH,/data/realrobot_pick_place_dexcollector.zarr}
robot_ip: ${oc.env:UR5E_IP,192.168.1.109}
hand_port: ${oc.env:INSPIRE_HAND_PORT,/dev/ttyUSB0}
head_camera_type: ${oc.env:REALROBOT_HEAD_CAMERA,orbbec_femto_bolt}
wrist_camera_type: ${oc.env:REALROBOT_WRIST_CAMERA,l515}
head_mask_mode: ${oc.env:REALROBOT_HEAD_MASK_MODE,zeros}
arm_action_mode: ${oc.env:REALROBOT_ARM_ACTION_MODE,joint}
arm_state_mode: ${oc.env:REALROBOT_ARM_STATE_MODE,joint}
arm_encoding: ${oc.env:REALROBOT_ARM_ENCODING,normalized_minus1_1}
arm_norm_center: 0.0
arm_norm_scale: 6.283185307179586
clip_normalized_arm_action: true
hand_encoding: ${oc.env:REALROBOT_HAND_ENCODING,normalized_minus1_1}
use_mask: false
use_right_cam_img: true
obs_mode: auto  # advanced override: head_rgb, rgbm, head_rgb_right_cam, full, state, or auto

execution:
  mode: real_robot
  enable_eval: false
  enable_amq: false
  enable_cm_policy: false
  stop_env_on_keyboard_interrupt: true

shape_meta: &shape_meta
  obs:
    right_state:
      shape: [12]
      type: low_dim
    head_rgb:
      shape:
        - ${task.image_height}
        - ${task.image_width}
        - 3
      type: rgb
    rgbm:
      shape:
        - ${task.image_height}
        - ${task.image_width}
        - 4
      type: rgb
    right_cam_img:
      shape:
        - ${task.image_height}
        - ${task.image_width}
        - 3
      type: rgb
  action:
    shape: [12]

env_runner:
  _target_: diffusion_policy_3d.env_runner.real_robot_runner.RealRobotRunner
  env:
    _target_: diffusion_policy_3d.env.real_robot.ur5e_inspire_dualcam_env.UR5eInspireDualCamEnv
    shape_meta: *shape_meta
    robot_ip: ${task.robot_ip}
    hand_port: ${task.hand_port}
    arm_action_mode: ${task.arm_action_mode}
    arm_state_mode: ${task.arm_state_mode}
    arm_encoding: ${task.arm_encoding}
    arm_norm_center: ${task.arm_norm_center}
    arm_norm_scale: ${task.arm_norm_scale}
    clip_normalized_arm_action: ${task.clip_normalized_arm_action}
    hand_encoding: ${task.hand_encoding}
    hand_norm_center: 1000.0
    hand_norm_scale: 1000.0
    low_level_control_hz: 100
    high_level_step_hz: 20
    action_interp_steps: 5
    arm_acceleration: 0.1
    arm_speed: 0.1
    arm_low_pass_alpha: null
    head_camera_type: ${task.head_camera_type}
    wrist_camera_type: ${task.wrist_camera_type}
    convert_bgr_to_rgb: false
    head_mask_mode: ${task.head_mask_mode}
    manual_reset: true
    reset_prompt: "[UR5eInspireDualCamEnv] Reset pick-place scene, then press Enter to start the next rollout."
    reset_settle_sec: 0.5
    step_settle_sec: 0.0
  shape_meta: *shape_meta
  eval_episodes: 1
  obs_mode: ${task.obs_mode}
  use_mask: ${task.use_mask}
  use_right_cam_img: ${task.use_right_cam_img}
  max_steps: 200
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  task_name: ${task.task_name}
  fps: 10
  tqdm_interval_sec: 5.0
  episode_end_mode: env_or_manual_or_max_steps
  reward_mode: terminal_sparse_manual
  success_reward: 1.0
  failure_reward: 0.0
  gamma: 0.99
  prompt_after_chunk: true
  prompt_for_terminal_label: true
  stop_on_keyboard_interrupt: ${task.execution.stop_env_on_keyboard_interrupt}

dataset:
  _target_: diffusion_policy_3d.dataset.real_robot_dataset.RealRobotDataset
  zarr_path: ${task.dataset_zarr_path}
  shape_meta: *shape_meta
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: null
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  gamma: 0.99
  obs_mode: ${task.obs_mode}
  use_mask: ${task.use_mask}
  use_right_cam_img: ${task.use_right_cam_img}
