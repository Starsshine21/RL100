name: peg-insert-side

task_name: ${.name}

point_cloud:
  num_points: 512
  channels: 3
  use_pc_color: false
  use_point_crop: true
  sampling_method: fps

demonstration:
  num_episodes: 100

shape_meta: &shape_meta
  obs:
    point_cloud:
      shape:
        - ${task.point_cloud.num_points}
        - ${task.point_cloud.channels}
      type: point_cloud
    agent_pos:
      shape: [9]
      type: low_dim
  action:
    shape: [4]

env_runner:
  _target_: diffusion_policy_3d.env_runner.metaworld_runner.MetaworldRunner
  eval_episodes: 100
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}
  fps: 10
  n_envs: null
  n_train: null
  n_test: null
  task_name: ${task_name}
  device: ${training.device}
  use_point_crop: ${task.point_cloud.use_point_crop}
  use_pc_color: ${task.point_cloud.use_pc_color}
  point_sampling_method: ${task.point_cloud.sampling_method}
  num_points: ${task.point_cloud.num_points}

dataset:
  _target_: diffusion_policy_3d.dataset.metaworld_dataset.MetaworldDataset
  zarr_path: data/metaworld_peg-insert-side_expert.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 90
  n_action_steps: ${n_action_steps}   # for chunk reward: R_chunk = Σ γ^j r_{t+j}
  gamma: 0.99                          # per-step gamma; critics use gamma^n_c
